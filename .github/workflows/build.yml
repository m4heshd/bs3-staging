name: build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [released]
  workflow_dispatch: {}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15, macos-15-intel, windows-2022]
        node: [22, 24, 25, 26]
    name: Testing Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - if: ${{ startsWith(matrix.os, 'windows') }}
        run: pip.exe install setuptools
      - if: ${{ startsWith(matrix.os, 'macos') }}
        run: brew install python-setuptools
      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: python3 -m pip install setuptools
      - if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.node < 25 }}
        run: |
          sudo apt update
          sudo apt install gcc-10 g++-10 -y
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100 --slave /usr/bin/g++ g++ /usr/bin/g++-10
      - if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.node >= 25 }}
        run: |
          sudo apt update
          sudo apt install gcc-11 g++-11 -y
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100 --slave /usr/bin/g++ g++ /usr/bin/g++-11
      - run: npm install --ignore-scripts
      - run: npm run build-debug
      - run: npm test
      - name: Test SpatiaLite extension
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: |
          sudo apt update
          sudo apt install libsqlite3-mod-spatialite -y
          node -e "require('./lib/index.js')(':memory:').loadExtension('mod_spatialite').exec('SELECT InitSpatialMetaData();')"

  prebuild:
    if: ${{ github.event_name == 'release' }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: macos-15
            target: darwin-arm64
          - os: windows-2022
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64
    name: Prebuild ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - if: ${{ startsWith(matrix.os, 'windows') }}
        run: pip.exe install setuptools
      - if: ${{ startsWith(matrix.os, 'macos') }}
        run: brew install python-setuptools
      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        run: python3 -m pip install setuptools
      - run: npm install --ignore-scripts
      - run: npm run build-release
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: build/Release/better_sqlite3.node
          if-no-files-found: error

  prebuild-alpine:
    if: ${{ github.event_name == 'release' }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            target: linuxmusl-x64
          - platform: linux/arm64
            target: linuxmusl-arm64
    name: Prebuild ${{ matrix.target }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - name: Build in Alpine
        run: |
          docker run --rm \
            --platform ${{ matrix.platform }} \
            --volume "${{ github.workspace }}:/project" \
            --workdir /project \
            node:22-alpine \
            sh -c "apk add --no-cache build-base python3 py3-setuptools && \
              npm install --ignore-scripts && \
              npm run build-release && \
              mkdir -p prebuilds && \
              cp build/Release/better_sqlite3.node prebuilds/${{ matrix.target }}.node && \
              rm -rf build && \
              node -e \"require('./lib')(':memory:').close()\""
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}.node
          if-no-files-found: error

  publish:
    if: ${{ github.event_name == 'release' }}
    needs: [prebuild, prebuild-alpine]
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8
        with:
          pattern: '*-*'
          path: artifacts
      - name: Verify all prebuilds are present
        shell: bash
        run: |
          mkdir -p prebuilds
          for target in linux-x64 linux-arm64 linuxmusl-x64 linuxmusl-arm64 darwin-x64 darwin-arm64 win32-x64 win32-arm64; do
            cp artifacts/$target/*.node "prebuilds/$target.node"
          done
      - run: npm install -g npm@latest
      - run: npm publish --provenance
